<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>𐊎ꝛꛚ · The Threshold</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://main.mrla.ng">
    <link rel="dns-prefetch" href="https://main.mrla.ng">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            width: 100%;
            height: 100%;
            background: #003300;
        }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #003300;
            font-family: 'Inter', system-ui, sans-serif;
            transition: background 2s ease;
        }

        body.dissolved {
            background: #003300;
        }

        body.dissolved #stage {
            opacity: 0;
            pointer-events: none;
        }

        /* main stage */
        #stage {
            position: absolute;
            inset: 0;
            transition: opacity 2s ease;
        }

        /* ========== SPLASH ========== */
        #splash {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: #003300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 3.5s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            backdrop-filter: blur(0px);
        }

        #splash.fading {
            opacity: 0;
            pointer-events: none;
        }

        /* MAIN LOGO: 𐊎ꝛꛚ — yellow pulsing glow (non-bold) */
        .s-logo-img {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            font-weight: 400;
            font-style: normal;
            color: #FEF612;
            text-align: center;
            letter-spacing: -0.05em;
            filter: drop-shadow(0 0 8px #FEF612) brightness(1.1);
            animation: pulseGlow 2.5s ease-in-out infinite both;
            line-height: 1;
        }

        /* ----- PULSE GLOW ANIMATION (the "MRL above" effect) ----- */
        @keyframes pulseGlow {
            0%, 100% {
                filter: drop-shadow(0 0 8px #FEF612) brightness(1.1);
                text-shadow: 0 0 4px #FEF612;
            }
            50% {
                filter: drop-shadow(0 0 20px #FEF612) brightness(1.35);
                text-shadow: 0 0 12px #FEF612;
            }
        }

        /* welcome text */
        .s-welcome {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(0.8rem, 2vw, 1.25rem);
            font-weight: 400;
            font-style: italic;
            color: rgba(255, 255, 255, 0.28);
            letter-spacing: 0.04em;
            text-align: center;
            max-width: 520px;
            line-height: 1.6;
            margin-bottom: clamp(2rem, 7vh, 5rem);
        }

        .s-divider {
            width: 44px;
            height: 1px;
            background: rgba(255, 255, 255, 0.09);
            margin-bottom: clamp(2rem, 7vh, 5rem);
        }

        /* ========== ✦ ENHANCED TAP SECTION: doorway + "TAP TO ENTER" ✦ ========== */
        /* container that groups the door symbol and text — both get the same pulsing glow as MRL */
        .enter-glow-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            /* inherit the pulseGlow animation to make both elements glow together */
            animation: pulseGlow 2.5s ease-in-out infinite both;
            filter: drop-shadow(0 0 6px #FEF612);
            transition: filter 0.2s ease;
        }

        /* doorway icon wrapper — bright yellow, animated glow via parent */
        .s-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #FEF612;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .s-ring svg {
            width: 32px;
            height: 32px;
            stroke: #FEF612;
            stroke-width: 1.6;
            filter: drop-shadow(0 0 4px #FEF612);
            transition: all 0.2s;
        }

        /* "TAP TO ENTER" text — matches glow and color from MRL logo */
        .s-cta {
            font-size: clamp(0.65rem, 0.9vw, 0.85rem);
            font-weight: 700;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: #FEF612;
            background: transparent;
            text-shadow: 0 0 4px #FEF612;
            transition: letter-spacing 0.3s ease;
        }

        /* subtle hover / tap lift effect — keeps glowing but adds slight scale */
        #splash:hover .enter-glow-group {
            transform: scale(1.02);
            filter: drop-shadow(0 0 12px #FEF612) brightness(1.2);
        }

        #splash:active .enter-glow-group {
            transform: scale(0.98);
        }

        /* entrance fade-up animations for all splash elements */
        .s-in {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeup 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .s-in:nth-child(1) {
            animation-delay: 0.2s;
        }

        .s-in:nth-child(2) {
            animation-delay: 0.5s;
        }

        .s-in:nth-child(3) {
            animation-delay: 0.85s;
        }

        .s-in:nth-child(4) {
            animation-delay: 1.15s;
        }

        .s-in:nth-child(5) {
            animation-delay: 1.45s;
        }

        @keyframes fadeup {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== VIDEO LAYER ========== */
        #video-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            background: #000;
        }

        #video-layer iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: max(100%, calc(100vh * 16 / 9));
            height: max(100%, calc(100vw * 9 / 16));
            transform: translate(-50%, -50%);
            border: none;
        }

        /* lower-third (speaker) */
        #lower-third {
            position: absolute;
            bottom: clamp(1.5rem, 5vh, 3rem);
            width: 100%;
            text-align: center;
            z-index: 25;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
        }

        .lt-rule {
            width: 36px;
            height: 1px;
            background: rgba(255, 255, 0, 0.3);
            margin: 0 auto 0.8rem;
        }

        .lt-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1rem, 2.4vw, 1.55rem);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.2rem;
        }

        .lt-role {
            font-size: clamp(0.58rem, 0.95vw, 0.75rem);
            font-weight: 300;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
        }

        /* quotes layer */
        #quote-layer {
